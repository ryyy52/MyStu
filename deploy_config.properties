# 部署配置文件
# 请根据实际环境修改以下配置

# Tomcat配置
TOMCAT_HOME=D:\apache-tomcat-8.5.84
TOMCAT_PORT=8080
TOMCAT_MANAGER_USERNAME=admin
TOMCAT_MANAGER_PASSWORD=admin

# 项目配置
PROJECT_NAME=ecommerce-system
PROJECT_WAR_PATH=c:\Users\a2423\Desktop\WWEB\target\ecommerce-system.war
PROJECT_CONTEXT_PATH=/ecommerce-system

# 部署选项
# 1 - 使用批处理脚本部署（需要管理员权限）
# 2 - 使用Maven Tomcat插件部署（需要Tomcat管理器配置）
DEPLOY_METHOD=1

# 使用说明：
# 1. 对于批处理脚本部署：
#    - 以管理员身份运行 deploy_to_tomcat.bat
#
# 2. 对于Maven插件部署：
#    - 确保Tomcat已启动
#    - 确保Tomcat管理器已配置并启用
#    - 在Tomcat的conf/tomcat-users.xml中添加管理员用户
#    - 运行：mvn tomcat7:deploy 或 mvn tomcat7:redeploy
#
# 3. 手动配置Tomcat用户示例（添加到conf/tomcat-users.xml）：
#    <role rolename="manager-gui"/>
#    <role rolename="manager-script"/>
#    <user username="admin" password="admin" roles="manager-gui,manager-script"/>